<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- GF letters -->
  <text x="256" y="310" font-family="'Segoe UI',Arial,sans-serif" font-size="210" font-weight="800"
        text-anchor="middle" fill="url(#accent)" letter-spacing="-8">GF</text>
  <!-- Bottom label -->
  <text x="256" y="430" font-family="'Segoe UI',Arial,sans-serif" font-size="52" font-weight="600"
        text-anchor="middle" fill="#94a3b8" letter-spacing="6">FILER</text>
  <!-- Green dot indicator (active filer) -->
  <circle cx="420" cy="100" r="36" fill="#22c55e"/>
  <text x="420" y="113" font-family="Arial" font-size="36" text-anchor="middle" fill="#fff">✓</text>
</svg>
